name: Windows Print Listener

on:
  pull_request:
    paths:
      - "tools/windows-print-listener/**"
      - ".github/workflows/windows-print-listener.yml"
  push:
    branches:
      - main
    paths:
      - "tools/windows-print-listener/**"
      - ".github/workflows/windows-print-listener.yml"
  workflow_dispatch:
    inputs:
      signed_release:
        description: "Zbuduj i udostępnij podpisane wydanie produkcyjne"
        required: true
        type: boolean
        default: false
      signing_profile:
        description: "Profil zaufania Authenticode"
        required: true
        type: choice
        default: internal
        options:
          - internal
          - public

permissions:
  actions: read
  contents: read

concurrency:
  group: windows-print-listener-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: pwsh

jobs:
  validate:
    name: Windows Server API baseline (${{ matrix.os }}, bez publikacji)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        # Hosted runners are server API baselines, not literal Windows 10/11
        # client certification. Clean Win10/11 VMs remain a release checklist.
        os: [windows-2022, windows-2025]

    steps:
      - name: Pobierz kod
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Sprawdź składnię skryptów PowerShell
        run: |
          Get-ChildItem .\tools\windows-print-listener -Filter *.ps1 -Recurse | ForEach-Object {
              [void] [ScriptBlock]::Create([IO.File]::ReadAllText($_.FullName))
          }

      - name: Ustaw Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.5"
          cache-dependency-path: tools/windows-print-listener/go.sum

      - name: Testy Go z detektorem wyścigów
        working-directory: tools/windows-print-listener
        run: go test -count=1 -race ./...

      - name: Analiza podatności Go
        working-directory: tools/windows-print-listener
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...

      - name: Pobierz i zweryfikuj NSIS 3.12
        run: .\tools\windows-print-listener\scripts\install-nsis.ps1

      - name: Zbuduj niepublikowany artefakt testowy
        run: .\tools\windows-print-listener\scripts\build.ps1

      - name: Zweryfikuj manifest i sumy
        run: .\tools\windows-print-listener\scripts\verify-artifacts.ps1

      - name: Przetestuj instalację, usługę i deinstalację
        run: >-
          .\tools\windows-print-listener\scripts\smoke-installer.ps1
          -InstallerPath .\tools\windows-print-listener\build\unsigned\SempreERP-PrintListener-Setup.exe

      # Celowo brak upload-artifact. Ten job tworzy niepodpisany plik wyłącznie
      # po to, aby przetestować instalator; plik nie jest wydaniem.

  signed_release:
    name: Podpisane wydanie produkcyjne
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.signed_release && github.ref == 'refs/heads/main' }}
    needs: validate
    runs-on: windows-2022
    timeout-minutes: 25
    environment: windows-code-signing

    outputs:
      version: ${{ steps.release.outputs.version }}

    env:
      WINDOWS_CODESIGN_PROFILE: ${{ inputs.signing_profile }}
      WINDOWS_CODESIGN_TIMESTAMP_URL: ${{ secrets.WINDOWS_CODESIGN_TIMESTAMP_URL }}
      WINDOWS_CODESIGN_SUBJECT: ${{ secrets.WINDOWS_CODESIGN_SUBJECT }}
      WINDOWS_CODESIGN_LEAF_SHA256: ${{ secrets.WINDOWS_CODESIGN_LEAF_SHA256 }}
      WINDOWS_CODESIGN_ROOT_SHA256: ${{ secrets.WINDOWS_CODESIGN_ROOT_SHA256 }}

    steps:
      - name: Pobierz kod
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Ustaw Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.5"
          cache-dependency-path: tools/windows-print-listener/go.sum

      - name: Pobierz i zweryfikuj NSIS 3.12
        run: .\tools\windows-print-listener\scripts\install-nsis.ps1

      - name: Przygotuj tymczasowy materiał podpisu
        env:
          WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          WINDOWS_CODESIGN_ROOT_CERT_BASE64: ${{ secrets.WINDOWS_CODESIGN_ROOT_CERT_BASE64 }}
          WINDOWS_CODESIGN_LEAF_CERT_BASE64: ${{ secrets.WINDOWS_CODESIGN_LEAF_CERT_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_PFX_BASE64)) {
              throw 'Brak sekretu WINDOWS_CODESIGN_PFX_BASE64.'
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP 'sempre-erp-codesign.pfx'
          [System.IO.File]::WriteAllBytes(
              $pfxPath,
              [Convert]::FromBase64String($env:WINDOWS_CODESIGN_PFX_BASE64)
          )
          "WINDOWS_CODESIGN_PFX_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          if ($env:WINDOWS_CODESIGN_PROFILE -eq 'internal') {
              if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_ROOT_CERT_BASE64) -or
                  [string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_LEAF_CERT_BASE64)) {
                  throw 'Profil internal wymaga sekretów publicznych certyfikatów root i wydawcy DER.'
              }
              $rootPath = Join-Path $env:RUNNER_TEMP 'sempre-erp-internal-root.cer'
              $leafPath = Join-Path $env:RUNNER_TEMP 'sempre-erp-internal-publisher.cer'
              [System.IO.File]::WriteAllBytes(
                  $rootPath,
                  [Convert]::FromBase64String($env:WINDOWS_CODESIGN_ROOT_CERT_BASE64)
              )
              [System.IO.File]::WriteAllBytes(
                  $leafPath,
                  [Convert]::FromBase64String($env:WINDOWS_CODESIGN_LEAF_CERT_BASE64)
              )
              "WINDOWS_CODESIGN_ROOT_CERT_PATH=$rootPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              "WINDOWS_CODESIGN_LEAF_CERT_PATH=$leafPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } elseif ($env:WINDOWS_CODESIGN_PROFILE -ne 'public') {
              throw 'Profil podpisu musi mieć wartość internal albo public.'
          }

      - name: Zbuduj, podpisz i zweryfikuj wydanie
        env:
          # Hasło jest udostępniane tylko procesowi importującemu PFX. Skrypt
          # usuwa je ze swojego środowiska przed uruchomieniem NSIS/SignTool.
          WINDOWS_CODESIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PFX_PASSWORD }}
        run: .\tools\windows-print-listener\scripts\release.ps1

      - name: Usuń tymczasowy PFX
        if: ${{ always() }}
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_PFX_PATH)) {
              Remove-Item -LiteralPath $env:WINDOWS_CODESIGN_PFX_PATH -Force -ErrorAction SilentlyContinue
          }

      - name: Przeskanuj podpisane artefakty Microsoft Defender
        id: defender
        run: .\tools\windows-print-listener\scripts\scan-defender.ps1

      - name: Przetestuj podpisany instalator
        run: >-
          .\tools\windows-print-listener\scripts\smoke-installer.ps1
          -InstallerPath .\tools\windows-print-listener\dist\SempreERP-PrintListener-Setup.exe
          -RequireSignature

      - name: Raport skanu Microsoft Defender
        if: ${{ always() && steps.defender.outcome != 'skipped' }}
        run: |
          @"
          ### Microsoft Defender
          - status: `${{ steps.defender.outputs.status || steps.defender.outcome }}`
          - wynik: `${{ steps.defender.outputs.message || 'skan zakończył się błędem — zobacz log kroku' }}`
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Odczytaj wersję
        id: release
        run: |
          $version = (Get-Content .\tools\windows-print-listener\VERSION -Raw).Trim()
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Udostępnij podpisane artefakty publiczne
        if: ${{ env.WINDOWS_CODESIGN_PROFILE == 'public' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sempre-erp-print-listener-${{ steps.release.outputs.version }}-signed
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          path: |
            tools/windows-print-listener/dist/SempreERP-PrintListener-Setup.exe
            tools/windows-print-listener/dist/RELEASE-MANIFEST.json
            tools/windows-print-listener/dist/SHA256SUMS.txt
            tools/windows-print-listener/build/windows-amd64/lemon-print-listener.exe

      - name: Udostępnij podpisane artefakty wewnętrzne i łańcuch zaufania
        if: ${{ env.WINDOWS_CODESIGN_PROFILE == 'internal' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sempre-erp-print-listener-${{ steps.release.outputs.version }}-signed
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          path: |
            tools/windows-print-listener/dist/SempreERP-PrintListener-Setup.exe
            tools/windows-print-listener/dist/RELEASE-MANIFEST.json
            tools/windows-print-listener/dist/SHA256SUMS.txt
            tools/windows-print-listener/dist/SempreERP-Internal-Root.cer
            tools/windows-print-listener/dist/SempreERP-Internal-Publisher.cer
            tools/windows-print-listener/build/windows-amd64/lemon-print-listener.exe

      - name: Usuń tymczasowe publiczne certyfikaty
        if: ${{ always() }}
        run: |
          foreach ($path in @(
              $env:WINDOWS_CODESIGN_ROOT_CERT_PATH,
              $env:WINDOWS_CODESIGN_LEAF_CERT_PATH
          )) {
              if (-not [string]::IsNullOrWhiteSpace([string] $path)) {
                  Remove-Item -LiteralPath $path -Force -ErrorAction SilentlyContinue
              }
          }

  deploy_signed_release:
    name: Opublikuj podpisany instalator w ERP
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.signed_release && github.ref == 'refs/heads/main' }}
    needs: signed_release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production

    steps:
      - name: Pobierz kod publikatora
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Pobierz zweryfikowane podpisane artefakty
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sempre-erp-print-listener-${{ needs.signed_release.outputs.version }}-signed
          path: signed-release

      - name: Odszukaj katalog wydania
        id: release
        shell: bash
        run: |
          set -euo pipefail
          installer="$(find signed-release -type f -name 'SempreERP-PrintListener-Setup.exe' -print -quit)"
          if [[ -z "$installer" ]]; then
            echo "Brak podpisanego instalatora w pobranym artefakcie." >&2
            exit 1
          fi
          release_dir="$(dirname "$installer")"
          test -f "$release_dir/RELEASE-MANIFEST.json"
          test -f "$release_dir/SHA256SUMS.txt"
          echo "directory=$release_dir" >> "$GITHUB_OUTPUT"

      - name: Zweryfikuj cel i skonfiguruj przypięte SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/deploy_key ~/.ssh/known_hosts

          export KNOWN_HOSTS_FILE="$HOME/.ssh/known_hosts"
          bash scripts/deploy/validate-target.sh
          ssh-keygen -y -P '' -f ~/.ssh/deploy_key >/dev/null

          {
            printf 'Host windows-release-production\n'
            printf '  HostName %s\n' "$SSH_HOST"
            printf '  User %s\n' "$SSH_USER"
            printf '  Port %s\n' "$SSH_PORT"
            printf '  IdentityFile %s/.ssh/deploy_key\n' "$HOME"
            printf '  UserKnownHostsFile %s/.ssh/known_hosts\n' "$HOME"
            printf '  IdentitiesOnly yes\n'
            printf '  BatchMode yes\n'
            printf '  StrictHostKeyChecking yes\n'
            printf '  ConnectTimeout 10\n'
            printf '  ServerAliveInterval 15\n'
            printf '  ServerAliveCountMax 3\n'
            printf '  LogLevel ERROR\n'
          } > ~/.ssh/config
          chmod 0600 ~/.ssh/config
          ssh windows-release-production true

      - name: Opublikuj wydanie atomowo we współdzielonym katalogu
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          RELEASE_DIR: ${{ steps.release.outputs.directory }}
          RELEASE_VERSION: ${{ needs.signed_release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          release_id="$RELEASE_VERSION-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          if [[ ! "$release_id" =~ ^[0-9]+\.[0-9]+\.[0-9]+-[0-9]+-[0-9]+$ ]]; then
            echo "Identyfikator wydania jest nieprawidłowy." >&2
            exit 1
          fi

          deploy_root="${DEPLOY_PATH}.deploy"
          remote_staging="${deploy_root}/.windows-release-upload-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          signing_profile="$(jq -er '.signing_profile | select(. == "internal" or . == "public")' "$RELEASE_DIR/RELEASE-MANIFEST.json")"
          release_channel="$(jq -er '.release_channel | select(. == "internal" or . == "public")' "$RELEASE_DIR/RELEASE-MANIFEST.json")"
          if [[ "$signing_profile" != "$release_channel" ]]; then
            echo "Manifest ma niespójny profil i kanał wydania." >&2
            exit 1
          fi
          release_files=(
            "$RELEASE_DIR/SempreERP-PrintListener-Setup.exe"
            "$RELEASE_DIR/RELEASE-MANIFEST.json"
            "$RELEASE_DIR/SHA256SUMS.txt"
          )
          if [[ "$signing_profile" == 'internal' ]]; then
            release_files+=(
              "$RELEASE_DIR/SempreERP-Internal-Root.cer"
              "$RELEASE_DIR/SempreERP-Internal-Publisher.cer"
            )
          fi
          for release_file in "${release_files[@]}"; do
            test -f "$release_file"
          done
          # Wszystkie interpolowane wartości są ograniczone walidatorami do bezpiecznych ścieżek/identyfikatorów.
          # shellcheck disable=SC2029
          ssh windows-release-production \
            "set -eu; \
             test -f '$deploy_root/DEPLOY_PATH'; \
             test \"\$(cat '$deploy_root/DEPLOY_PATH')\" = '$DEPLOY_PATH'; \
             test ! -e '$remote_staging'; \
             mkdir -m 0750 '$remote_staging'"
          scp "${release_files[@]}" "windows-release-production:${remote_staging}/"

          # Zweryfikowane wartości mają być argumentami zdalnego publikatora.
          # shellcheck disable=SC2029
          ssh windows-release-production \
            "bash -s -- '$DEPLOY_PATH' '$release_id' '$remote_staging'" \
            < scripts/deploy/publish-windows-listener.sh

      - name: Usuń lokalny materiał SSH
        if: ${{ always() }}
        shell: bash
        run: rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts ~/.ssh/config
